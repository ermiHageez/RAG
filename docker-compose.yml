services:
  mcp-server:
    build: .
    container_name: etech-mcp-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - faiss_data:/app/faiss_store
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\",8000)); s.close()'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["python", "-m", "mcp_server.run", "--sse", "--port", "8000"]

  agent-api:
    build: .
    container_name: etech-agent-api
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - faiss_data:/app/faiss_store
      - ./data:/app/data:ro
    depends_on:
      mcp-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8001/health\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8001"]

  n8n:
    image: n8nio/n8n:latest
    container_name: etech-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8nemail:/backup
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:5678/healthz 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  faiss_data:
  n8n_data:
